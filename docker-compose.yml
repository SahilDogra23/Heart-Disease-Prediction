version : '3.8'

services:
  api:
    build: 
      context: .
      dockerfile: Dockerfile 
    ports:
      - "8000:8000"
    container_name: heart-disease-api 

  frontend:
    build: 
      context: .
      dockerfile: Dockerfile.streamlit 
    ports:
      - "8501:8501"
    depends_on:
      - api
    container_name: heart-disease-frontend